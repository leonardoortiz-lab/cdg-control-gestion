name: Recordatorio Semanal CdG

on:
  schedule:
    # Lunes 11:00 UTC = 8:00am Chile (UTC-3)
    - cron: '0 11 * * 1'
  workflow_dispatch: # permite correrlo manualmente desde GitHub

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar recordatorio semanal
        run: |
          curl -X POST "https://cdg-control-gestion-cqoq.vercel.app/api/weekly-reminder" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail \
            --silent \
            --show-error
